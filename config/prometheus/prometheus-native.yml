global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'shared-observability'

rule_files:
  - /Users/jeffbridwell/CascadeProjects/shared-observability/config/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter — native macOS host metrics (both machines)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9102']
        labels:
          machine: 'library'
      - targets: ['192.168.86.242:9100']
        labels:
          machine: 'bedroom'

  # Express app metrics (native LaunchAgent)
  - job_name: 'gathering-app'
    static_configs:
      - targets: ['localhost:3000']
    metrics_path: /metrics

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['localhost:3102']

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['localhost:3100']

  # Promtail metrics
  - job_name: 'promtail'
    static_configs:
      - targets: ['localhost:9080']

  # Blackbox HTTP probe for WordPress
  - job_name: 'blackbox-wordpress'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://localhost:8081
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # Blackbox HTTP probe for Fuseki
  - job_name: 'blackbox-fuseki'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://localhost:3030/$/ping
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # Blackbox HTTP probe for Express app
  - job_name: 'blackbox-app'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://localhost:3000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # Blackbox HTTP probe for Vikunja (kanban board)
  - job_name: 'blackbox-vikunja'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://localhost:3456/api/v1/info
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # Blackbox HTTP probe for Navidrome (music server — Bedroom Mac)
  - job_name: 'blackbox-navidrome'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://192.168.86.242:4533/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # Blackbox HTTP probe for CSS (Community Solid Server)
  - job_name: 'blackbox-css'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://localhost:3001/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # Blackbox HTTP probe for Alertmanager
  - job_name: 'blackbox-alertmanager'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://localhost:9093/-/healthy
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # Cloudflare Tunnel metrics
  - job_name: 'cloudflared'
    static_configs:
      - targets: ['localhost:20241']
        labels:
          tunnel: 'lightlifeurbangardens'

  # Blackbox HTTPS probe for public site
  - job_name: 'blackbox-external'
    metrics_path: /probe
    params:
      module: [http_2xx_tls]
    scrape_interval: 60s
    static_configs:
      - targets:
        - https://lightlifeurbangardens.com/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # MySQL exporter
  - job_name: 'mysqld-exporter'
    static_configs:
      - targets: ['localhost:9104']

  # ICMP ping probes for all home network devices
  - job_name: 'blackbox-icmp'
