      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

  # NiFi metrics (Bedroom Mac — custom exporter on port 9091)
  - job_name: 'nifi'
    scrape_interval: 15s
    static_configs:
      - targets: ['192.168.86.242:9091']
        labels:
          machine: 'bedroom'
          service: 'nifi'

  # Blackbox HTTP probe for Bedroom Mac — Images API (Gallery)
  - job_name: 'blackbox-images-api'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
