groups:
  - name: harvest-pipeline
    rules:
      # Stage hasn't run in 48 hours (skip not_started stages)
      # Scoped to job="node-exporter" to avoid duplicate alerts from docker-services scrape
      - alert: HarvestStageStale
        expr: >
          (time() - harvest_stage_last_run_epoch{job="node-exporter"} > 172800)
          and harvest_stage_status{job="node-exporter"} > 0
          and harvest_stage_status{job="node-exporter"} < 5
        for: 1h
        labels:
          severity: warning
          domain: infra
        annotations:
          summary: "Harvest {{ $labels.domain }}/{{ $labels.stage }} stale (>48h)"
          description: "Stage {{ $labels.stage }} for {{ $labels.domain }} hasn't run in over 48 hours."

      # Domain has too many open gaps
      - alert: HarvestDomainGaps
        expr: harvest_domain_gap_count{job="node-exporter"} > 3
        for: 1h
        labels:
          severity: warning
          domain: infra
        annotations:
          summary: "Harvest {{ $labels.domain }} has {{ $value }} gaps"
          description: "Domain {{ $labels.domain }} has more than 3 open gaps. Review manifest."

      # Exporter itself hasn't run in 30 minutes
      - alert: HarvestExporterDown
        expr: (time() - harvest_exporter_last_run_epoch{job="node-exporter"}) > 1800
        for: 5m
        labels:
          severity: warning
          domain: infra
        annotations:
          summary: "Harvest exporter not running"
          description: "harvest-exporter.sh hasn't updated metrics in 30 minutes. Check LaunchAgent."
