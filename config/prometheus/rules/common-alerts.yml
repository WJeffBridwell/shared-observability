groups:
  - name: service-availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
          domain: infra
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

      - alert: ContainerRestarting
        expr: increase(container_restarts_total[1h]) > 3
        for: 5m
        labels:
          severity: warning
          domain: app
        annotations:
          summary: "Container {{ $labels.name }} is restarting frequently"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last hour."

  - name: http-metrics
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[2m])) by (service)
          /
          sum(rate(http_requests_total[2m])) by (service) > 0.05
        for: 2m
        labels:
          severity: warning
          domain: app
        annotations:
          summary: "High error rate for {{ $labels.service }}"
          description: "{{ $labels.service }} has error rate of {{ $value | humanizePercentage }} over the last 2 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 1
        for: 5m
        labels:
          severity: warning
          domain: app
        annotations:
          summary: "High latency for {{ $labels.service }}"
          description: "{{ $labels.service }} P95 latency is {{ $value | humanizeDuration }}."

  - name: host-resources
    rules:
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 15m
        labels:
          severity: warning
          domain: infra
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
          domain: infra
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}."

      # Docker Desktop exposes host FS via /host_mnt, /run/host_mark, /run/host_virtiofs,
      # /run/grpcfuse, /run/rosetta — all duplicates of the same APFS volume.
      # Bedroom media partition drives (/Volumes/Videos<Name>-<Name>, /Volumes/VideosMulti)
      # are intentionally full — excluded to prevent 23+ alerts of wallpaper.
      # /Volumes/VideosNew (Gathering) and /Volumes/PhotosNew still monitored.
      # macOS system volumes (Hardware, iSCPreboot, xarts, autofs) excluded — always tiny.
      - alert: DiskSpaceWarning
        expr: |
          (1 - node_filesystem_avail_bytes{
            fstype!~"tmpfs|overlay|erofs|fakeowner|virtiofs|fuse.grpcfuse|virtiofs\\..*|autofs",
            mountpoint!~"/oldroot.*|/host_mnt.*|/run/host.*|/run/rosetta.*|/run/grpcfuse.*|/Volumes/Videos[A-Z].*-.*|/Volumes/VideosMulti|/System/Volumes/(Hardware|iSCPreboot|xarts|Preboot|Update|VM|Data)"
          } / node_filesystem_size_bytes{
            fstype!~"tmpfs|overlay|erofs|fakeowner|virtiofs|fuse.grpcfuse|virtiofs\\..*|autofs",
            mountpoint!~"/oldroot.*|/host_mnt.*|/run/host.*|/run/rosetta.*|/run/grpcfuse.*|/Volumes/Videos[A-Z].*-.*|/Volumes/VideosMulti|/System/Volumes/(Hardware|iSCPreboot|xarts|Preboot|Update|VM|Data)"
          }) > 0.85
        for: 5m
        labels:
          severity: warning
          domain: infra
        annotations:
          summary: "Disk usage above 85% on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} is at {{ $value | humanizePercentage }} usage."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{
            fstype!~"tmpfs|overlay|erofs|fakeowner|virtiofs|fuse.grpcfuse|virtiofs\\..*|autofs",
            mountpoint!~"/oldroot.*|/host_mnt.*|/run/host.*|/run/rosetta.*|/run/grpcfuse.*|/Volumes/Videos[A-Z].*-.*|/Volumes/VideosMulti|/System/Volumes/(Hardware|iSCPreboot|xarts|Preboot|Update|VM|Data)"
          } / node_filesystem_size_bytes{
            fstype!~"tmpfs|overlay|erofs|fakeowner|virtiofs|fuse.grpcfuse|virtiofs\\..*|autofs",
            mountpoint!~"/oldroot.*|/host_mnt.*|/run/host.*|/run/rosetta.*|/run/grpcfuse.*|/Volumes/Videos[A-Z].*-.*|/Volumes/VideosMulti|/System/Volumes/(Hardware|iSCPreboot|xarts|Preboot|Update|VM|Data)"
          }) < 0.1
        for: 5m
        labels:
          severity: critical
          domain: infra
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} has only {{ $value | humanizePercentage }} free."

  - name: blackbox-probes
    rules:
      - alert: EndpointDown
        expr: probe_success{job!="blackbox-icmp"} == 0
        for: 5m
        labels:
          severity: critical
          domain: app
        annotations:
          summary: "Endpoint {{ $labels.instance }} is down"
          description: "Blackbox probe for {{ $labels.instance }} (job {{ $labels.job }}) has been failing for 2 minutes."

  # HighErrorLogRate moved to Grafana Loki-based alerting (contact-points.yaml).
  # LogQL expressions cannot evaluate in Prometheus — only Loki ruler or Grafana.
