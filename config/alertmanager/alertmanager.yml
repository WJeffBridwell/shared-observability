global:
  resolve_timeout: 5m

# Deploy-aware suppression (#656) — when DeployInProgress fires,
# suppress transient alerts that are expected during container cycling
inhibit_rules:
  - source_matchers:
      - alertname = "DeployInProgress"
    target_matchers:
      - alertname =~ "ServiceDown|EndpointDown|HighLatency|HighErrorRate"
    equal: []

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'macos-notify'
  routes:
    - match:
        severity: critical
      receiver: 'macos-notify'
      repeat_interval: 1h

# Slack receivers removed 2026-02-22 (Slack deprecated, card #135).
# Replaced with macOS native notifications via alert-notifier.py (card #202).
receivers:
  - name: 'macos-notify'
    webhook_configs:
      - url: 'http://host.docker.internal:9095'
        send_resolved: true
  - name: 'null'
