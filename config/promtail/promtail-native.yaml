server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /Users/jeffbridwell/Library/Logs/Gathering/promtail-positions.yaml

clients:
  - url: http://localhost:3102/loki/api/v1/push
    tenant_id: default
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # Docker container logs — read directly from host filesystem
  # Remaining Docker containers: Fuseki, CSS, WordPress, MySQL
  - job_name: docker-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/**/*.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - output:
          source: log

  # chorus-operations job retired 2026-05-04 (silas). Was tailing
  # ~/Library/Logs/Chorus/chorus.log, which became orphaned when the producer
  # moved to platform/logs/chorus.log on 2026-04-25 and never wrote there
  # again. Mar 29 → Apr 25 contents have been concatenated into the live
  # platform-chorus job's file and reshipped under that single label.

  # Command error logs
  - job_name: command-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: command-errors
          __path__: /Users/jeffbridwell/CascadeProjects/messages/logs/command-errors.log
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            role: role
            severity: severity
            cmd: cmd
            error: error
            fingerprint: fingerprint
      - labels:
          role:
          severity:
          fingerprint:
      - timestamp:
          source: ts
          format: '2006-01-02T15:04:05.000Z'

  # Handoff logs
  - job_name: handoffs
    static_configs:
      - targets:
          - localhost
        labels:
          job: handoffs
          __path__: /Users/jeffbridwell/CascadeProjects/messages/logs/handoffs.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            type: type
            from: from
            to: to
            status: status
      - labels:
          from:
          to:
          type:
          status:
      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05Z'

  # Permission prompt logs
  - job_name: permission-prompts
    static_configs:
      - targets:
          - localhost
        labels:
          job: permission-prompts
          __path__: /Users/jeffbridwell/CascadeProjects/messages/logs/permission-prompts.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            appName: appName
            component: component
            event: event
            role: role
            tool: tool
      - labels:
          role:
          appName:
          tool:
      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000Z'

  # All Chorus daemon logs — glob catches every .log in the directory
  # __path_exclude__ prevents duplicates with dedicated scrape jobs (#1986)
  - job_name: chorus-daemon-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: daemon-logs
          __path__: /Users/jeffbridwell/Library/Logs/Chorus/*.log
          __path_exclude__: /Users/jeffbridwell/Library/Logs/Chorus/{chorus.log,chorus-api.log,tempo.log}
    pipeline_stages:
      - regex:
          expression: '^(?P<content>.+)$'
      - output:
          source: content

  # All Gathering daemon logs
  # __path_exclude__ prevents duplicates with dedicated scrape jobs (#1986)
  - job_name: gathering-daemon-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: daemon-logs
          __path__: /Users/jeffbridwell/Library/Logs/Gathering/*.log
          __path_exclude__: /Users/jeffbridwell/Library/Logs/Gathering/{perf-baseline.log,fuseki-compact.log,alert-notifier.log,cloudflared.log}
    pipeline_stages:
      - regex:
          expression: '^(?P<content>.+)$'
      - output:
          source: content

  # Chorus embed worker + session watcher
  - job_name: chorus-home-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: daemon-logs
          __path__: /Users/jeffbridwell/.chorus/*.log
          # Exclude chorus.log — it's the spine event journal, owned by the
          # platform-chorus-log job (job=platform-chorus, appName labels parsed).
          # Without this exclude, both jobs double-tail and rate-limit each
          # other. 2026-05-04 backfill receipt.
          __path_exclude__: /Users/jeffbridwell/.chorus/chorus.log
    pipeline_stages:
      - regex:
          expression: '^(?P<content>.+)$'
      - output:
          source: content

  # Platform operational logs
  - job_name: platform-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: platform-logs
          __path__: /Users/jeffbridwell/CascadeProjects/chorus/platform/logs/*.log
      - targets:
          - localhost
