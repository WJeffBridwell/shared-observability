server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: default
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # Docker container logs via Docker API (docker_sd_configs reads from Docker daemon directly)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: network
            values: ['observability-network']
    relabel_configs:
      # Extract container name (strip leading slash)
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container_name

      # Extract compose service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

      # Extract compose project name
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project

      # Extract custom appName label if present
      - source_labels: [__meta_docker_container_label_appName]
        target_label: appName

    pipeline_stages:
      # Parse Docker JSON log wrapper
      - docker: {}
      # Extract structured fields from app JSON logs
      - json:
          expressions:
            level: level
            appName: appName
            component: component
      - labels:
          level:
          appName:
          component:
      # Drop internal observability container logs (relabel drop doesn't work in Docker SD)
      - match:
          selector: '{container_name=~"prometheus|grafana|loki|promtail|node-exporter|alertmanager|blackbox-exporter|mysqld-exporter"}'
          action: drop

  # Host-level operational logs (Chorus audit, guardrails, deploy events)
  - job_name: chorus-operations
    static_configs:
      - targets:
          - localhost
        labels:
          job: chorus-operations
          __path__: /host-logs/chorus.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            appName: appName
            component: component
            role: role
            check: check
            decision: decision
            pattern: pattern
            message: message

      - labels:
          level:
          appName:
          component:
          role:

      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000Z'

      - output:
          source: message

  # Command error logs (Bash failure introspection from command-outcome-hook.sh)
  - job_name: command-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: command-errors
          __path__: /host-logs/command-errors.log

    pipeline_stages:
      - json:
          expressions:
            ts: ts
            role: role
            severity: severity
            cmd: cmd
            error: error
            fingerprint: fingerprint

      - labels:
          role:
          severity:
          fingerprint:

      - timestamp:
          source: ts
          format: '2006-01-02T15:04:05.000Z'

  # Handoff logs (role-to-role brief exchange tracking)
  - job_name: handoffs
    static_configs:
      - targets:
          - localhost
        labels:
          job: handoffs
          __path__: /host-logs/handoffs.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            type: type
            from: from
            to: to
            status: status

      - labels:
          from:
          to:
          type:
          status:

      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05Z'

  # Permission prompt logs (tool call tracking from permission-logger-hook.sh)
  - job_name: permission-prompts
    static_configs:
      - targets:
          - localhost
        labels:
          job: permission-prompts
          __path__: /host-logs/permission-prompts.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            appName: appName
            component: component
            event: event
            role: role
            tool: tool

      - labels:
          role:
          appName:
          tool:

      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000Z'

  # LaunchAgent daemon logs (ops-agent, defect-poller, fuseki-perf)
  # These are the operational pollers that produce findings but had no readers.
  - job_name: daemon-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: daemon-logs
          daemon: ops-agent
          __path__: /host-tmp/ops-agent.log
      - targets:
          - localhost
        labels:
          job: daemon-logs
          daemon: defect-poller
          __path__: /host-tmp/defect-poller.log
      - targets:
          - localhost
        labels:
          job: daemon-logs
          daemon: fuseki-perf
          __path__: /host-tmp/fuseki-perf.log

    pipeline_stages:
      - regex:
          expression: '^(?P<content>.+)$'
      - output:
          source: content

  # Performance baseline measurements (test/build/deploy/login/search)
  - job_name: perf-baseline
    static_configs:
      - targets:
          - localhost
        labels:
          job: perf-baseline
          __path__: /host-tmp/perf-baseline.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            function: function
            durationMs: durationMs
            status: status
            detail: detail
      - labels:
          function:
          status:
      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000Z'

  # Team activity log (role actions, brief exchanges, decisions)
  - job_name: activity
    static_configs:
      - targets:
          - localhost
        labels:
          job: activity
          __path__: /host-messages/activity.md

    pipeline_stages:
      - regex:
          expression: '^- \[(?P<role>[^\]]+)\] → (?P<action>.+)$'
      - labels:
          role:
      - output:
          source: action

  # Session watcher log (ambient indexing daemon)
  - job_name: session-watcher
    static_configs:
      - targets:
          - localhost
        labels:
          job: session-watcher
          daemon: session-watcher
          __path__: /host-chorus/watcher.log

    pipeline_stages:
      - regex:
          expression: '^(?P<content>.+)$'
      - output:
          source: content

  # Chorus API log (context index HTTP service)
  - job_name: chorus-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: chorus-api
          daemon: chorus-api
          __path__: /host-tmp/chorus-api.log

    pipeline_stages:
      - regex:
          expression: '^(?P<content>.+)$'
      - output:
          source: content

  # Board snapshot logs (Vikunja board state captures)
  - job_name: board-snapshots
    static_configs:
      - targets:
          - localhost
        labels:
          job: board-snapshots
          __path__: /host-logs/board-snapshot-*.json

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            role: role
            event: event
            cards_total: cards_total
      - labels:
          role:
          event:
      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000Z'

  # Fuseki compaction log (weekly TDB2 maintenance)
  - job_name: fuseki-compact
    static_configs:
      - targets:
          - localhost
        labels:
          job: fuseki-compact
          daemon: fuseki-compact
          __path__: /host-tmp/fuseki-compact.log

    pipeline_stages:
      - regex:
          expression: '^(?P<content>.+)$'
      - output:
          source: content

  # Alert notifier log (banner notification delivery)
  - job_name: alert-notifier
    static_configs:
      - targets:
          - localhost
        labels:
          job: alert-notifier
          daemon: alert-notifier
          __path__: /host-tmp/alert-notifier.log

    pipeline_stages:
      - regex:
          expression: '^(?P<content>.+)$'
      - output:
          source: content

  # SOLID audit logs (user access events from the app)
  - job_name: audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: audit
          __path__: /host-audit/audit-*.jsonl

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            eventType: eventType
            actor: actor
            podId: podId
            resource: resource
            action: action
            success: success

      - labels:
          eventType:
          podId:
          action:

      - timestamp:
          source: timestamp
          format: '2006-01-02T15:04:05.000Z'
